<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goose Journal</title>

  <!-- Keep CSS split by responsibility: foundations, app shell, journal surface. -->
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/app.css" />
  <link rel="stylesheet" href="styles/journal.css" />
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar" aria-label="Entry shelf">
      <div class="sidebar-header">
        <button class="round-button" id="hideSidebarBtn" type="button" aria-label="Hide entry shelf">‹</button>
        <div>
          <p class="eyebrow">Goose Journal</p>
          <h1>Entry shelf</h1>
        </div>
      </div>

      <label class="search-box">
        <span aria-hidden="true">⌕</span>
        <input id="searchInput" type="search" placeholder="Search memories…" />
      </label>

      <!-- Embedded calendar: intentionally not a floating popup, so it can't drift left. -->
      <section class="calendar-card" aria-label="Mini calendar">
        <div class="calendar-header">
          <button class="tiny-button" id="prevMonthBtn" type="button" aria-label="Previous month">‹</button>
          <strong id="calendarTitle"></strong>
          <button class="tiny-button" id="nextMonthBtn" type="button" aria-label="Next month">›</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <div class="entry-list" id="entryList"></div>
    </aside>

    <button class="sidebar-tab" id="showSidebarBtn" type="button" aria-label="Show entry shelf">›</button>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Soft landing</p>
          <h2>Today’s page</h2>
        </div>
        <div class="topbar-actions">
          <button class="soft-button" id="focusBtn" type="button">Focus</button>
          <button class="soft-button" id="customizeBtn" type="button">Customize</button>
          <button class="primary-button" id="newEntryBtn" type="button">+ New entry</button>
        </div>
      </header>

      <section class="customize-panel" id="customizePanel" hidden>
        <div class="panel-group">
          <div class="panel-label">Palette</div>
          <div class="palette-list" id="paletteList"></div>
        </div>

        <div class="panel-group">
          <div class="panel-label">Font</div>
          <div class="font-list" id="fontList"></div>
        </div>

        <div class="panel-group">
          <div class="panel-label">Stickers</div>
          <div class="sticker-picker" id="stickerPicker"></div>
        </div>
      </section>

      <section class="page-stage">
        <article class="journal-page" id="journalPage">
          <div class="sticker-layer" id="stickerLayer" aria-label="Stickers on page"></div>

          <div class="meta-row">
            <label class="meta-chip"><span>🗓️</span><input id="dateInput" aria-label="Entry date" /></label>
            <label class="meta-chip"><span>⏰</span><input id="timeInput" aria-label="Entry time" /></label>
            <button class="meta-chip emoji-button" id="locationBtn" type="button" aria-label="Location">🏠</button>
            <button class="meta-chip emoji-button" id="weatherBtn" type="button" aria-label="Weather">🌤️</button>
            <button class="meta-chip emoji-button" id="moodBtn" type="button" aria-label="Mood">😌</button>
            <button class="hide-title-button" id="titleToggleBtn" type="button">Hide title</button>
          </div>

          <div class="emoji-menu" id="emojiMenu" hidden></div>

          <input class="entry-title-input" id="titleInput" placeholder="Title, if today wants one…" />
          <div class="soft-rule"></div>
          <div class="entry-body" id="bodyInput" contenteditable="true" spellcheck="true"></div>
        </article>
      </section>

      <footer class="statusbar">
        <span id="wordCount">Words: 0</span>
        <span id="saveStatus">Saved locally</span>
      </footer>
    </main>

    <div class="goose-friend" id="gooseFriend">
      <div class="goose-bubble" id="gooseBubble">soft landing.</div>
      <button class="goose-button" id="gooseButton" type="button" aria-label="Ask the goose for encouragement">
        <img src="assets/goose.svg" alt="" />
      </button>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
